<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Conectar WhatsApp - INDX</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0a0a0a; color: #d0d0d0; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .container { max-width: 500px; width: 100%; padding: 2rem; }
        h1 { font-size: 1.8rem; color: #fff; text-align: center; margin-bottom: 0.5rem; }
        .subtitle { text-align: center; color: #666; margin-bottom: 2rem; }
        .card { background: #111; border: 1px solid #222; border-radius: 16px; padding: 2rem; }
        .steps { margin-bottom: 2rem; }
        .step { display: flex; gap: 1rem; margin-bottom: 1.2rem; align-items: flex-start; }
        .step-num { background: #1a1a1a; border: 1px solid #333; color: #25D366; width: 28px; height: 28px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 0.8rem; font-weight: 700; flex-shrink: 0; }
        .step-text { font-size: 0.9rem; color: #999; line-height: 1.5; }
        .step-text strong { color: #ccc; }
        .btn-whatsapp { display: flex; align-items: center; justify-content: center; gap: 0.8rem; width: 100%; padding: 1rem; background: #25D366; color: #fff; border: none; border-radius: 12px; font-size: 1.1rem; font-weight: 600; cursor: pointer; transition: all 0.2s; }
        .btn-whatsapp:hover { background: #20bd5a; transform: translateY(-1px); }
        .btn-whatsapp:disabled { background: #333; color: #666; cursor: not-allowed; transform: none; }
        .btn-whatsapp svg { width: 24px; height: 24px; }
        .status { margin-top: 1.5rem; padding: 1rem; border-radius: 10px; display: none; font-size: 0.9rem; }
        .status.success { display: block; background: #0a2a1a; border: 1px solid #25D366; color: #25D366; }
        .status.error { display: block; background: #2a0a0a; border: 1px solid #e33; color: #e33; }
        .status.loading { display: block; background: #1a1a0a; border: 1px solid #d4a; color: #da4; }
        .result-data { margin-top: 1rem; font-family: monospace; font-size: 0.8rem; color: #888; word-break: break-all; }
        .footer { text-align: center; margin-top: 2rem; font-size: 0.8rem; color: #444; }
        .footer a { color: #25D366; text-decoration: none; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Conectar WhatsApp</h1>
        <p class="subtitle">Vincule seu WhatsApp Business a API da INDX</p>

        <div class="card">
            <div class="steps">
                <div class="step">
                    <div class="step-num">1</div>
                    <div class="step-text">Clique no botao abaixo para iniciar a conexao</div>
                </div>
                <div class="step">
                    <div class="step-num">2</div>
                    <div class="step-text"><strong>Faca login</strong> com sua conta do Facebook</div>
                </div>
                <div class="step">
                    <div class="step-num">3</div>
                    <div class="step-text">Selecione ou crie sua <strong>conta WhatsApp Business</strong></div>
                </div>
                <div class="step">
                    <div class="step-num">4</div>
                    <div class="step-text">Seu WhatsApp Business App <strong>continua funcionando normalmente</strong> no celular</div>
                </div>
            </div>

            <button id="btn-connect" class="btn-whatsapp" onclick="launchWhatsAppSignup()">
                <svg viewBox="0 0 24 24" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
                Conectar WhatsApp Business
            </button>

            <div id="status" class="status"></div>
            <div id="result-data" class="result-data"></div>
        </div>

        <div class="footer">
            <a href="/idx/privacidade.html">Privacidade</a> &middot; <a href="/idx/termos.html">Termos</a>
        </div>
    </div>

    <!-- Facebook SDK -->
    <script>
        // ===========================================
        // CONFIGURACAO - Altere estes valores
        // ===========================================
        const CONFIG = {
            appId: '852417467117358',
            configId: '1482509996939342',
            backendUrl: 'https://meta.idx.ia.br/signup',
            apiVersion: 'v21.0'
        };

        // Facebook SDK init
        window.fbAsyncInit = function() {
            FB.init({
                appId: CONFIG.appId,
                autoLogAppEvents: true,
                xfbml: true,
                version: CONFIG.apiVersion
            });
        };

        // Listener para mensagens do Embedded Signup
        window.addEventListener('message', function(event) {
            if (event.origin !== 'https://www.facebook.com' && event.origin !== 'https://web.facebook.com') return;

            try {
                const data = JSON.parse(event.data);
                if (data.type === 'WA_EMBEDDED_SIGNUP') {
                    const { current_step, phone_number_id, waba_id } = data.data;

                    if (phone_number_id && waba_id) {
                        showStatus('success', 'WhatsApp conectado com sucesso!');
                        document.getElementById('result-data').innerHTML =
                            `WABA ID: ${waba_id}<br>Phone Number ID: ${phone_number_id}`;
                    }
                }
            } catch (e) {
                // Ignora mensagens que nao sao JSON
            }
        });

        function showStatus(type, msg) {
            const el = document.getElementById('status');
            el.className = 'status ' + type;
            el.textContent = msg;
        }

        function launchWhatsAppSignup() {
            const btn = document.getElementById('btn-connect');
            btn.disabled = true;
            showStatus('loading', 'Abrindo janela de conexao...');

            FB.login(function(response) {
                if (response.authResponse) {
                    const code = response.authResponse.code;
                    showStatus('loading', 'Processando autorizacao...');

                    // Envia o code para o backend trocar por token
                    fetch(CONFIG.backendUrl, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ code: code })
                    })
                    .then(r => r.json())
                    .then(data => {
                        if (data.success) {
                            showStatus('success',
                                'Conectado! WABA: ' + (data.waba_id || 'processando...'));
                            if (data.waba_id || data.phone_number_id) {
                                document.getElementById('result-data').innerHTML =
                                    `WABA ID: ${data.waba_id || '-'}<br>` +
                                    `Phone ID: ${data.phone_number_id || '-'}<br>` +
                                    `Nome: ${data.verified_name || '-'}`;
                            }
                        } else {
                            showStatus('error', 'Erro: ' + (data.error || 'Falha na conexao'));
                        }
                    })
                    .catch(err => {
                        showStatus('error', 'Erro de comunicacao: ' + err.message);
                    })
                    .finally(() => { btn.disabled = false; });

                } else {
                    showStatus('error', 'Conexao cancelada pelo usuario.');
                    btn.disabled = false;
                }
            }, {
                config_id: CONFIG.configId,
                response_type: 'code',
                override_default_response_type: true,
                extras: {
                    setup: {},
                    featureType: '',
                    sessionInfoVersion: '3',
                }
            });
        }
    </script>
    <script async defer crossorigin="anonymous"
        src="https://connect.facebook.net/pt_BR/sdk.js"></script>
</body>
</html>
